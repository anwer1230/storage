openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Video Downloader API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: downloader
    description: Video download operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /formats:
    get:
      operationId: getFormats
      tags: [downloader]
      summary: Get available video formats for a URL
      parameters:
        - name: url
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of available formats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FormatsResult"
        "400":
          description: Invalid URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "422":
          description: Unsupported URL or extraction error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    VideoFormat:
      type: object
      required: [formatId, label, size, sizeBytes, type]
      properties:
        formatId:
          type: string
        label:
          type: string
        size:
          type: string
        sizeBytes:
          type: number
        type:
          type: string
          enum: [combined, merged, audio]

    FormatsResult:
      type: object
      required: [title, formats]
      properties:
        title:
          type: string
        thumbnail:
          type: ["string", "null"]
        duration:
          type: ["number", "null"]
        formats:
          type: array
          items:
            $ref: "#/components/schemas/VideoFormat"

    ApiError:
      type: object
      required: [error]
      properties:
        error:
          type: string
